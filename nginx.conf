worker_processes  1;                         # 소형 EC2면 1개면 충분
events { worker_connections  1024; }

http {
  # ───── 기본 설정 ─────
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout  65;

  # Gzip 권장 (정적·SSE 모두)
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

  # ───── 업스트림 정의 ─────
  upstream nestjs_upstream {
    server  app:3000;        # Compose 서비스명으로 DNS 해결
  }

  # ───── 서버 블록 ─────
  server {
    listen 80;
    server_name _;           # 특정 도메인 쓰려면 snubaseball.site 등 지정

    # 정적 파일 캐싱 예시 (Nest dist/public 폴더 등)
    location /static/ {
      alias /usr/share/nginx/html/static/;
      expires 7d;
      access_log off;
    }

    # API / SSE 등 모든 나머지 요청 프록시
    location / {
      proxy_pass         http://nestjs_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;

      # SSE / WebSocket 옵션
      proxy_set_header   Connection        '';
      proxy_cache_bypass $http_upgrade;
    }

    # 헬스체크 엔드포인트 노출 금지 예시 (선택)
    location /health {
      deny all;
      return 404;
    }
  }
}
