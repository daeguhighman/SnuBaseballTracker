services:
  # ─────────────────── NestJS 애플리케이션 ───────────────────
  app:
    image: docker.io/daeguhighman/snubaseball-nestjs:latest
    container_name: nestjs
    env_file: .env
    environment:
      - NODE_ENV=production
    restart: always
    expose:
      - "3000"                # 내부 네트워크에만 노출 (cloudflared가 접근)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3

  # ─────────────────────── Cloudflare Tunnel ───────────────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: always
    command: tunnel --no-autoupdate --protocol http2 run --token ${CF_TUNNEL_TOKEN}
    depends_on:
      - app
