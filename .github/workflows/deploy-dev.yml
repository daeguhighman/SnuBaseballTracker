# GitHub Actions: Build & Push Docker Image to Docker Hub
# -----------------------------------------------------------
# 필요한 Secrets (Repository Settings → Secrets and variables → Actions):
#   - DOCKERHUB_USERNAME : Docker Hub 사용자명
#   - DOCKERHUB_TOKEN    : Docker Hub Personal Access Token ("Read, Write, Delete")

name: Build & Push (Docker Hub)

on:
  push:
    branches: [develop]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1) 소스 체크아웃
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2) Docker Buildx 설치 (멀티‑플랫폼 빌드를 위해 권장)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3) Docker Hub 로그인
      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 4) Build & Push
      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64    # 필요 시 linux/arm64 추가
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/snubaseball:nestjs:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/snubaseball:nestjs:${{ github.sha }}

      # 5) Optional: 이미지 사이즈 출력
      - name: Image digest
        run: echo "Image pushed with digest ${{ steps.build-and-push.outputs.digest }}"
