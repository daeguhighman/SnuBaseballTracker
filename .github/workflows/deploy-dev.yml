name: Build & Push & Deploy (Docker Hub → EC2)

on:
  push:
    branches: [dev]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and push image
        id: buildpush
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/snubaseball:nestjs:latest
            ${{ secrets.DOCKER_USERNAME }}/snubaseball:nestjs:${{ github.sha }}

      - name: Image digest
        run: echo "Image pushed with digest ${{ steps.buildpush.outputs.digest }}"

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push   # build 후에만 실행
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            cd /snubaseball
            docker compose pull
            docker compose up -d
            docker image prune -f
            echo "Deploy done on $(hostname) at $(date)"
