          description: "인증되지 않은 요청"
        "404":
          description: "경기 또는 타자 기록을 찾을 수 없음"

  /games/{gameId}/result/pitchers/{pitcherGameStatsId}:
    patch:
      summary: "투수 기록 수정"
      description: |
        특정 게임의 투수 기록을 수정합니다.
        - 삼진 수 등
      tags: [games]
      security:
        - BearerAuth: []
      parameters:
        - name: gameId
          in: path
          required: true
          schema:
            type: integer
          description: "경기 ID"
          example: 101
        - name: pitcherGameStatsId
          in: path
          required: true
          schema:
            type: integer
          description: "투수 게임 기록 ID"
          example: 301
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePitcherStatsRequest"
      responses:
        "200":
          description: "투수 기록 수정 성공"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdatePitcherResponse"
        "400":
          description: "잘못된 요청 데이터"
        "401":
          description: "인증되지 않은 요청"
        "404":
          description: "경기 또는 투수 기록을 찾을 수 없음"

  /admin/change-phase/{tournamentId}:
    patch:
      summary: "토너먼트 단계 변경"
      tags: [admin]
      parameters:
        - name: tournamentId
          required: true
          in: path
          schema:
            type: integer
          description: "토너먼트 ID"
          example: 1
      responses:
        "200":
          description: "토너먼트 단계 변경 성공"
        "400":
          description: "잘못된 요청"
        "404":
          description: "토너먼트를 찾을 수 없음"

  /games/{gameId}/snapshot/umpire:
    get:
      summary: "게임 최신 심판용 스냅샷 조회"
      description: |
        해당 게임의 가장 최신 umpire snapshot을 조회합니다.
        심판용 화면에서 현재 게임 상황을 확인할 수 있습니다.
        
        **주요 특징:**
        - 가장 최신 play를 기준으로 스냅샷 생성
        - playerRecords 미포함 (심판용)
        - 현재 타자/투수, 주자 상황, 이닝 통계 등 포함
      tags: [games]
      parameters:
        - name: gameId
          in: path
          required: true
          schema:
            type: integer
          description: "게임 ID"
          example: 1001
      responses:
        "200":
          description: "심판용 스냅샷 조회 성공"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaySnapshotResponse"
        "404":
          description: "게임 또는 플레이 기록을 찾을 수 없음"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    # Tournament Schedule Response
    TournamentScheduleResponse:
      type: object
      properties:
        games:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
                example: 101
              bracketPosition:
                type: string
                example: "A1"
              homeTeam:
                type: object
                properties:
                  id:
                    type: integer
                    example: 1
                  name:
                    type: string
                    example: "관악사"
                required:
                  - id
                  - name
              awayTeam:
                type: object
                properties:
                  id:
                    type: integer
                    example: 2
                  name:
                    type: string
                    example: "공대"
                required:
                  - id
                  - name
              status:
                type: string
                example: "SCHEDULED"
              startTime:
                type: string
                format: date-time
                example: "2025-04-23T09:00:00Z"
            required:
              - id
              - bracketPosition
              - homeTeam
              - awayTeam
              - status
              - startTime
      required:
        - games

    # Tournament Related Schemas
    TournamentListResponse:
      type: object
      properties:
        tournaments:
          type: array
          description: "토너먼트 목록"
          items:
            $ref: "#/components/schemas/Tournament"
        count:
          type: integer
          description: "토너먼트 총 개수"
          example: 5
      required:
        - tournaments
        - count

    Tournament:
      type: object
      properties:
        id:
          type: integer
          description: "토너먼트 ID"
          example: 1
        name:
          type: string
          enum: [총장배, 종합체육대회, 스누리그, 스누나래]
          description: "토너먼트 이름"
          example: "총장배"
        year:
          type: integer
          description: "토너먼트 연도"
          example: 2025
      required:
        - id
        - type
        - year


    # Team Related Schemas
    GroupedTeamResponse:
      type: object
      additionalProperties:
        $ref: "#/components/schemas/TeamList"
      example:
        A:
          - id: 1
            name: "관악사"
            games: 4
            wins: 4
            draws: 0
            losses: 0
            rank: 1
          - id: 2
            name: "포톤스"
            games: 4
            wins: 3
            draws: 0
            losses: 1
            rank: 2
        B:
          - id: 3
            name: "아갉쥐"
            games: 4
            wins: 2
            draws: 0
            losses: 2
            rank: 1
    
    TeamList:
      type: array
      items:
        $ref: "#/components/schemas/Team"

    Team:
      type: object
      properties:
        id:
          type: integer
          description: "팀-토너먼트 ID (TeamTournament ID)"
          example: 1
        name:
          type: string
          example: "관악사"
        games:
          type: integer
          example: 4
        wins:
          type: integer
          example: 2
        draws:
          type: integer
          example: 0
        losses:
          type: integer
          example: 2
        rank:
          type: integer
          example: 1

    # Game Related Schemas
    GamesByDatesResponse:
      type: object
      properties:
        range:
          type: object
          properties:
            from:
              type: string
              format: date
              description: "조회 시작 날짜 (YYYY-MM-DD)"
              example: "2025-04-23"
            to:
              type: string
              format: date
              description: "조회 종료 날짜 (YYYY-MM-DD)"
              example: "2025-04-25"
          required:
            - from
            - to
        days:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
                format: date
                description: "날짜 (YYYY-MM-DD)"
                example: "2025-04-23"
              dayOfWeek:
                type: string
                description: "요일 정보"
                example: "수"
              games:
                type: array
                description: "해당 날짜의 경기 목록"
                items:
                  $ref: "#/components/schemas/Game"
            required:
              - date
              - dayOfWeek
              - games
      required:
        - range
        - days

    Game:
      type: object
      properties:
        id:
          type: integer
          description: "경기 ID"
          example: 101
        time:
          type: string
          description: "경기 시작 시간 (HH:MM)"
          example: "09:00"
        status:
          type: string
          description: "경기 상태"
          example: "IN_PROGRESS"
        stage:
          type: string
          description: "경기 단계"
          example: "LEAGUE"
        inning:
          type: integer
          nullable: true
          description: "현재 이닝"
          example: 5
        inningHalf:
          type: string
          description: "초/말"
          example: "BOT"
        isForfeit:
          type: boolean
          example: false
        winnerTeamId:
          type: integer
          nullable: true
          example: 1
        homeTeam:
          type: object
          properties:
            id:
              type: integer
              example: 1
            name:
              type: string
              example: "관악사"
            score:
              type: integer
              nullable: true
              example: 10
        awayTeam:
          type: object
          properties:
            id:
              type: integer
              example: 2
            name:
              type: string
              example: "공대"
            score:
              type: integer
              nullable: true
              example: 6
        canRecord:
          type: boolean
          description: "현재 사용자가 해당 경기의 심판인지 여부"
          example: true
        canSubmitLineup:
          type: object
          description: "현재 사용자의 라인업 제출 권한"
          properties:
            home:
              type: boolean
              description: "홈팀 라인업 제출 권한"
              example: false
            away:
              type: boolean
              description: "원정팀 라인업 제출 권한"
              example: true
          required:
            - home
            - away
      required:
        - id
        - time
        - status
        - stage
        - homeTeam
        - awayTeam
        - isForfeit
        - canRecord
        - canSubmitLineup

    # Player Related Schemas
    PlayerListResponse:
      type: object
      properties:
        id:
          type: integer
          description: "팀-토너먼트 ID (TeamTournament ID)"
          example: 1
        name:
          type: string
          description: "팀 이름"
          example: "공대"
        players:
          type: array
          description: "선수 배열"
          items:
            $ref: "#/components/schemas/Player"
      required:
        - id
        - name
        - players

    PlayerListWithInLineupResponse:
      type: object
      properties:
        id:
          type: integer
          description: "팀 ID"
          example: 1
        name:
          type: string
          description: "팀 이름"
          example: "공대"
        players:
          type: array
          description: "선수 배열"
          items:
            $ref: "#/components/schemas/PlayerWithInLineup"
      required:
        - id
        - name
        - players

    Player:
      type: object
      properties:
        id:
          type: integer
          description: "선수-토너먼트 ID (PlayerTournament ID)"
          example: 101
        department:
          type: string
          description: "학과"
          example: "수학교육과"
        name:
          type: string
          description: "선수 이름"
          example: "윤동현"
        isElite:
          type: boolean
          description: "선출 여부 (true면 프로 경험자)"
          example: false
        isWc:
          type: boolean
          description: "WC 여부 (true면 와일드카드)"
          example: false  
      required:
        - id
        - department
        - name
        - isElite
        - isWc

    PlayerWithInLineup:
      type: object
      properties:
        id:
          type: integer
          description: "선수 ID"
          example: 101
        department:
          type: string
          description: "학과"
          example: "수학교육과"
        name:
          type: string
          description: "선수 이름"
          example: "윤동현"
        isElite:
          type: boolean
          description: "선출 여부 (true면 프로 경험자)"
          example: false
        isWc:
          type: boolean
          description: "WC 여부 (true면 와일드카드)"
          example: false
        inLineup:
          type: boolean
          description: "라인업 등록 여부"
          example: true
      required:
        - id
        - department
        - name
        - isElite
        - isWc
        - inLineup

    PlayerListResponseWithSubstitutionFlag:
      type: object
      properties:
        teamId:
          type: integer
          description: "팀 ID"
          example: 1
        teamName:
          type: string
          description: "팀 이름"
          example: "공대"
        players:
          type: array
          description: "선수 목록"
          items:
            $ref: "#/components/schemas/PlayerWithSubstitutionFlag"
      required:
        - teamId
        - teamName
        - players

    PlayerWithSubstitutionFlag:
      type: object
      properties:
        id:
          type: integer
          description: "선수 ID"
          example: 101
        name:
          type: string
          description: "선수 이름"
          example: "윤동현"
        department:
          type: string
          description: "학과"
          example: "수학교육과"
        isElite:
          type: boolean
          description: "선출 여부 (true면 프로 경험자)"
          example: false
        isWc:
          type: boolean
          description: "WC 여부 (true면 와일드카드)"
          example: false
        isSubstitutable:
          type: boolean
          description: "해당 선수가 교체 가능한지 여부"
          example: true
      required:
        - id
        - name
        - department
        - isElite
        - isWc
        - isSubstitutable

    # Lineup Related Schemas


    SubmitLineupRequest:
      type: object
      properties:
        batters:
          type: array
          description: "타순별 등록 선수 목록"
          items:
            $ref: "#/components/schemas/LineupBatter"
          minItems: 9
          maxItems: 9
        pitcher:
          $ref: "#/components/schemas/LineupPitcher"
      required:
        - batters
        - pitcher

    LineupBatter:
      type: object
      properties:
        battingOrder:
          type: integer
          nullable: true
          description: "타순 (1~9)"
          example: 1
        id:
          type: integer
          description: "playerTournamentId"
          example: 101
        position:
          type: string
          description: "포지션 (CF, SS, C, 1B, 2B, 3B, LF, RF, DH, P 등)"
          example: "CF"
      required:
        - id
        - battingOrder
        - position

    LineupBatterWithName:
      type: object
      properties:
        battingOrder:
          type: integer
          nullable: true
          description: "타순 (1~9)"
          example: 1
        id:
          type: integer
          description: "playerTournamentId"
          example: 101
        name:
          type: string
          description: "선수 이름"
          example: "윤동현"
        position:
          type: string
          description: "포지션 (CF, SS, C, 1B, 2B, 3B, LF, RF, DH, P 등)"
          example: "CF"
        isWC:
          type: boolean
          description: "WC 여부 (true면 와일드카드)"
          example: false
      required:
        - id
        - battingOrder
        - position
        - name

    LineupPitcher:
      type: object
      properties:
        id:
          type: integer
          description: "playerTournamentId"
          example: 110
      required:
        - id

    LineupPitcherWithName:
      type: object
      properties:
        id:
          type: integer
          description: "playerTournamentId"
          example: 110
        name:
          type: string
          description: "선수 이름"
          example: "김철수"
        isWC:
          type: boolean
          description: "WC 여부 (true면 와일드카드)"
          example: false
      required:
        - id
        - name

    SubmitLineupResponse:
      type: object
      properties:
        success:
          type: boolean
          description: "라인업 등록 성공 여부"
          example: true
        message:
          type: string
          description: "추가 메시지"
          example: "라인업 제출이 완료되었습니다."
      required:
        - success
        - message

    # Substitution Related Schemas
    SubmitSubstitutionRequest:
      type: object
      properties:
        playerIds:
          type: array
          description: "교체할 선수 ID 목록"
          example: [101, 102]
          items:
            type: integer
      required:
        - playerIds

    SubmitSubstitutionResponse:
      type: object
      properties:
        success:
          type: boolean
          description: "교체 명단 제출 성공 여부"
          example: true
        playerIds:
          type: array
          description: "교체된 선수 ID 목록"
          items:
            type: integer
          example: [101, 102]
      required:
        - success
        - playerIds

    # Records Related Schemas
    BatterRecordsResponse:
      type: object
      properties:
        count:
          type: integer
          description: "가져온 타자 수"
          example: 150
        batters:
          type: array
          description: "타자 기록 배열"
          items:
            $ref: "#/components/schemas/BatterRecord"
      required:
        - count
        - batters

    BatterRecord:
      type: object
      properties:
        rank:
          type: integer
          description: "순위"
          example: 1
        name:
          type: string
          description: "선수 이름"
          example: "박병호"
        team:
          type: string
          description: "소속 팀 이름"
          example: "관악사"
        teamGameCount:
          type: integer
          description: "소속 팀 경기 수"
          example: 4
        AVG:
          type: string
          format: float
          description: "타율 (Batting Average)"
          example: "0.312"
        PA:
          type: integer
          description: "타자 기록 수"
          example: 100
        AB:
          type: integer
          description: "타수 (At Bats)"
          example: 20
        H:
          type: integer
          description: "안타 수 (Hits)"
          example: 12
        "2B":
          type: integer
          description: "2루타 (Doubles)"
          example: 3
        "3B":
          type: integer
          description: "3루타 (Triples)"
          example: 1
        HR:
          type: integer
          description: "홈런 (Home Runs)"
          example: 0
        RBI:
          type: integer
          description: "타점 (Runs Batted In)"
          example: 8
        R:
          type: integer
          description: "득점 (Runs)"
          example: 5
        BB:
          type: integer
          description: "볼넷 (Base on Balls)"
          example: 1
        SO:
          type: integer
          description: "삼진 (Strikeouts)"
          example: 3
        OBP:
          type: string
          format: float
          description: "출루율 (On-Base Percentage)"
          example: "0.370"
        SLG:
          type: string
          format: float
          description: "장타율 (Slugging Percentage)"
          example: "0.550"
        OPS:
          type: string
          format: float
          description: "OPS (On-base + Slugging)"
          example: "0.920"
      required:
        - rank
        - name
        - team
        - AB
        - H
        - AVG

    PitcherRecordsResponse:
      type: object
      properties:
        count:
          type: integer
          description: "가져온 투수 수"
          example: 20
        pitchers:
          type: array
          description: "투수 기록 배열"
          items:
            $ref: "#/components/schemas/PitcherRecord"
      required:
        - count
        - pitchers

    PitcherRecord:
      type: object
      properties:
        rank:
          type: integer
          description: "순위"
          example: 1
        name:
          type: string
          description: "선수 이름"
          example: "배찬송"
        team:
          type: string
          description: "소속 팀 이름"
          example: "관악사"
        ERA:
          type: string
          format: float
          description: "평균자책점 (Earned Run Average)"
          example: "2.50"
        IP:
          type: integer
          description: "이닝 (Innings Pitched)"
          example: 15
        R:
          type: integer
          description: "실점 (Runs)"
          example: 8
        ER:
          type: integer
          description: "자책점 (Earned Runs)"
          example: 6
        K:
          type: integer
          description: "삼진 수 (Strikeouts)"
          example: 12
        BB:
          type: integer
          description: "사사구 (Base on Balls)"
          example: 5
      required:
        - rank
        - name
        - team
        - ERA
        - IP
        - R
        - ER
        - K
        - BB

    # Game Results Related Schemas
    GameResultsResponse:
      type: object
      properties:
        canRecord:
          type: boolean
          description: "기록 가능 여부 (심판인 경우 true)"
          example: true
        scoreboard:
          type: object
          properties:
            innings:
              type: array
              description: "이닝별 점수 목록"
              example:
                - inning: 1
                  away: 2
                  home: 1
                - inning: 2
                  away: 1
                  home: 3
                - inning: 3
                  away: 0
                  home: 0
                - inning: 4
                  away: 0
                  home: 0
                - inning: 5
                  away: 0
                  home: 0
                - inning: 6
                  away: 0
                  home: 0
              items:
                type: object
                properties:
                  inning:
                    type: integer
                    description: "이닝 번호"
                    example: 1
                  away:
                    type: integer
                    nullable: true
                    description: "원정팀 해당 이닝 점수"
                    example: 2
                  home:
                    type: integer
                    nullable: true
                    description: "홈팀 해당 이닝 점수"
                    example: 1
                required:
                  - inning
                  - away
                  - home
            totals:
              type: object
              properties:
                away:
                  type: object
                  properties:
                    R:
                      type: integer
                      description: "원정팀 총 득점"
                      example: 3
                    H:
                      type: integer
                      description: "원정팀 총 안타"
                      example: 8
                home:
                  type: object
                  properties:
                    R:
                      type: integer
                      description: "홈팀 총 득점"
                      example: 4
                    H:
                      type: integer
                      description: "홈팀 총 안타"
                      example: 12
              required:
                - away
                - home
          required:
            - innings
            - totals
        teamSummary:
          type: object
          properties:
