          type: boolean
          description: "WC 여부 (true면 와일드카드)"
          example: false
      required:
        - playerId
        - battingOrder
        - position
        - playerName
    LineupPitcher:
      type: object
      properties:
        playerId:
          type: integer
          description: "투수 선수 ID"
      required:
