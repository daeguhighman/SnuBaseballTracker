          items:
            $ref: "#/components/schemas/LineupBatter"
          minItems: 9
          maxItems: 9
        
        pitcher:
            $ref: "#/components/schemas/LineupPitcher"
      required:
        - batters
        - pitcher
      example:
        batters:
          - battingOrder : 1
            playerId: 101
            position: "CF"
          - battingOrder: 2
            playerId: 102
            position: "SS"
          - battingOrder: 3
            playerId: 103
            position: "C"
          - battingOrder: 4
            playerId: 104
            position: "1B"
          - battingOrder: 5
            playerId: 105
            position: "2B"
          - battingOrder: 6
            playerId: 106
            position: "3B"
          - battingOrder: 7
            playerId: 107
            position: "LF"
          - battingOrder: 8
            playerId: 108
            position: "RF"
          - battingOrder: 9
            playerId: 109
            position: "DH"
        pitcher:
