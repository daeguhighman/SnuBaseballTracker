            isElite: false
            isWc: false
            inLineup: false
          - id: 103
            departmentName: "사회학과"
            playerName: "김태균"
            isElite: true
            isWc: false
            inLineup: false
          - id: 104
            departmentName: "컴퓨터공학과"
            playerName: "박야구"
            isElite: false
            isWc: false   # 이미 선택되어 더 이상 선택 불가
            inLineup: false

    # 선수 개별 정보
    Player:
      type: object
      properties:
        id:
          type: integer
          description: "선수 ID"
          example: 101
        departmentName:
          type: string
          description: "학과"
          example: "수학교육과"
        name:
          type: string
          description: "선수 이름"
          example: "윤동현"
        isElite:
          type: boolean
          description: "선출 여부 (true면 프로 경험자)"
          example: false
        isWc:
          type: boolean
          description: "WC 여부 (true면 와일드카드)"
          example: false  
      required:
        - id
        - departmentName
        - name
        - isElite
        - isWc

    PlayerListResponseWithSubstitutionFlag:
      type: object
      properties:
        teamId:
          type: integer
          description: "팀 ID"
          example: 1
        teamName:
          type: string
          description: "팀 이름"
          example: "공대"
        # lineup:
        #   type: array
        #   description: "라인업"
        #   items:
        #     $ref: "#/components/schemas/LineupResponse"
        players:
          type: array
          description: "선수 목록"
          items:
            $ref: "#/components/schemas/PlayerWithSubstitutionFlag"
      required:
        - id
        - name
        - players
    PlayerWithSubstitutionFlag:
      type: object
      properties:
        id:
          type: integer
          description: "선수 ID"
          example: 101
        name:
          type: string
          description: "선수 이름"
          example: "윤동현"
        departmentName:
          type: string
          description: "학과"
          example: "수학교육과"
        isElite:
          type: boolean
          description: "선출 여부 (true면 프로 경험자)"
          example: false
        isWc:
          type: boolean
          description: "WC 여부 (true면 와일드카드)"
