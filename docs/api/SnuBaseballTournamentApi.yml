  /games/{gameId}/snapshot/stream:
    get:
      summary: "게임 실시간 스냅샷 스트림"
      description: |
        게임의 실시간 스냅샷을 SSE(Server-Sent Events)로 스트리밍합니다.
        관중용 화면에서 실시간으로 게임 상황을 확인할 수 있습니다.
        
        **연결 방식:**
        - 클라이언트는 EventSource API를 사용하여 연결
        - 서버는 게임 상태 변경 시 자동으로 스냅샷을 push
        - 연결이 끊어지면 자동으로 재연결 시도
        
        **이벤트 형식:**
        ```
        data: {"playId": 123, "gameSummary": {...}}
        ```
      tags: [games]
      parameters:
        - name: gameId
          in: path
          required: true
          schema:
            type: integer
          description: "게임 ID"
          example: 1001
      responses:
        "200":
          description: "SSE 스트림 시작"
          content:
            text/event-stream:
              schema:
                type: string
                description: |
                  Server-Sent Events 형식의 스트림
                  각 이벤트는 JSON 형태의 PlaySnapshotResponse 데이터를 포함
