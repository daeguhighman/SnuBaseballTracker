            time: "09:00"
            status: "FINALIZED"
            homeTeam:
              id: 1
              name: "자연대"
              score: 9
            awayTeam:
              id: 2
              name: "공대"
              score: 16
            
          - 
            gameId: 102
            time: "11:00"
            status: "EDITING"
            homeTeam:
              id: 1
              name: "자연대"
              score: 9
            awayTeam:
              id: 2
              name: "건환공"
              score: 6
            
          - 
            gameId: 103
            time: "14:00"
            status: "IN_PROGRESS"
            inning: 5
            inningHalf: "BOT"
            homeTeam:
              id: 1
              name: "관악사"
              score: 10
            awayTeam:
              id: 2
              name: "공대"
              score: 6
            
          - 
            gameId: 104
            time: "16:30"
            status: "SCHEDULED"
            homeTeam:
              id: 1
              name: "자연대"
              score: null
            awayTeam:
              id: 2
              name: "공대"
              score: null
            
          - 
            gameId: 105
            time: "19:00"
            status: "SCHEDULED"
            homeTeam:
              id: 1
              name: "자연대"
              score: null
            awayTeam:
              id: 2
              name: "공대"
              score: null


    # 경기 하나에 대한 스키마
    Game:
      type: object
      properties:
        gameId:
          type: integer
          description: "경기 ID"
          example: 101
        time:
          type: string
          description: "경기 시작 시간 (HH:MM)"
          example: "09:00"
        status:
          type: string
          description: "경기 상태"
          example: "IN_PROGRESS"
        stage:
          type: string
          description: "경기 단계"
          example: "LEAGUE"
        inning:
          type: integer
          nullable: true
          description: "현재 이닝"
          example: 5
        inningHalf:
          type: string
          description: "초/말"
          example: "BOT"
        isForfeit:
          type: boolean
          example: false
        winnerTeamId:
          type: integer
          nullable: true
          example: 1
        homeTeam:
          type: object
          properties:
            id:
              type: integer
              example: 1
            name:
              type: string
              example: "관악사"
            score:
              type: integer
              nullable: true
              example: 10
        awayTeam:
          type: object
          properties:
            id:
              type: integer
              example: 2
            name:
              type: string
              example: "공대"
            score:
              type: integer
              nullable: true
              example: 6
        canRecord:
          type: boolean
          description: "현재 사용자가 해당 경기의 심판인지 여부"
          example: true
        canSubmitLineup:
          type: object
          description: "현재 사용자의 라인업 제출 권한"
          properties:
            home:
              type: boolean
              description: "홈팀 라인업 제출 권한"
              example: false
            away:
              type: boolean
              description: "원정팀 라인업 제출 권한"
              example: true
          required:
            - home
            - away
      required:
        - gameId
        - time
        - status
        - stage
        - homeTeam
        - awayTeam
        - isForfeit
        - canRecord
        - canSubmitLineup


    BatterRecordsResponse:
      type: object
      properties:
        count:
          type: integer
          description: "가져온 타자 수"
          example: 150
        batters:
          type: array
          description: "타자 기록 배열"
          items:
            $ref: "#/components/schemas/BatterRecord"
      required:
        - count
        - batters

    BatterRecord:
      type: object
      properties:
        playerName:
          type: string
          description: "선수 이름"
          example: "박병호"
        teamName:
          type: string
          description: "소속 팀 이름"
          example: "관악사"
        teamGameCount:
          type: integer
          description: "소속 팀 경기 수"
          example: 4
        PA:
          type: integer
          description: "타자 기록 수"
          example: 100
        AB:
          type: integer
          description: "타수 (At Bats)"
          example: 20
        H:
          type: integer
          description: "안타 수 (Hits)"
          example: 12
        "2B":
          type: integer
          description: "2루타 (Doubles)"
          example: 3
        "3B":
          type: integer
          description: "3루타 (Triples)"
          example: 1
        HR:
          type: integer
          description: "홈런 (Home Runs)"
          example: 0
        BB:
          type: integer
          description: "볼넷 (Base on Balls)"
          example: 1
        AVG:
          type: string
          format: float
          description: "타율 (Batting Average)"
          example: "0.312"
        OBP:
          type: string
          format: float
          description: "출루율 (On-Base Percentage)"
          example: "0.370"
        SLG:
          type: string
          format: float
          description: "장타율 (Slugging Percentage)"
          example: "0.550"
        OPS:
          type: string
          format: float
          description: "OPS (On-base + Slugging)"
          example: "0.920"
      required:
        - rank
        - playerName
        - teamName
        - AB
        - H
        - AVG
      # (필요 시 "2B", "3B", "HR", "BB" 등도 필수에 넣을 수 있음)

    PitcherRecordsResponse:
      type: object
      properties:
        count:
          type: integer
          description: "가져온 투수 수"
          example: 20
        pitchers:
          type: array
          description: "투수 기록 배열"
          items:
            $ref: "#/components/schemas/PitcherRecord"
      required:
