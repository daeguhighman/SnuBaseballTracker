      responses:
        "200":
          description: "Undo 성공"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UndoResponse"
        "404":
          description: "Undo할 히스토리가 없음"

  /plays/{gameId}/redo:
    post:
      summary: "가장 최근 취소된 액션 재실행"
      description: |
        가장 최근에 취소된 액션을 다시 실행합니다.
        - 취소된 타석 생성, 타석 결과 업데이트, 주자 이벤트 추가 등을 재실행
        - 히스토리 기반으로 안전하게 재실행
      tags:
        - "plays"
      parameters:
        - name: gameId
          in: path
          required: true
          schema:
            type: integer
          description: "게임 ID"
          example: 1001
      responses:
        "200":
          description: "Redo 성공"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RedoResponse"
        "404":
          description: "Redo할 히스토리가 없음"

  /plays/{gameId}/history:
    get:
      summary: "게임 히스토리 조회"
      description: |
        게임의 모든 액션 히스토리를 조회합니다.
        - 타석 생성, 결과 업데이트, 주자 이벤트 추가 등의 히스토리
        - 각 액션의 상태(ACTIVE, UNDONE, REDONE) 확인 가능
      tags:
        - "plays"
      parameters:
        - name: gameId
          in: path
          required: true
          schema:
            type: integer
          description: "게임 ID"
          example: 1001
      responses:
        "200":
          description: "히스토리 조회 성공"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HistoryResponse"
        "404":
          description: "게임을 찾을 수 없음"

components:
  securitySchemes:
