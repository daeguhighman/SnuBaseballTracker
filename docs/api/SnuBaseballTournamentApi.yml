          - id: 103
            name: "김태균"
            departmentName: "사회학과"
            isElite: true
            isWc: false
          - id: 104
            name: "박야구"
            departmentName: "컴퓨터공학과"
            isElite: false
            isWc: false   # 이미 선택되어 더 이상 선택 불가
