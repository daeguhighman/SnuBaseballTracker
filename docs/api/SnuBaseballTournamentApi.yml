      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddRunnerEventsRequest"
      responses:
        "201":
          description: "주자 이벤트 추가 성공"
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "주자 이벤트가 성공적으로 추가되었습니다."
                  eventsCount:
                    type: integer
                    example: 2
        "400":
          description: "잘못된 요청 (예: 잘못된 베이스 위치, 이벤트 타입 등)"
