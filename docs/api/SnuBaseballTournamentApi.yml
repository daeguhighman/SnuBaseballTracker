        playerName:
          type: string
          description: "선수 이름"
          example: "김철수"
        isWC:
          type: boolean
          description: "WC 여부 (true면 와일드카드)"
          example: false
      required:
        - playerId
        - playerName
          
    SubmitLineupResponse:
      type: object
      properties:
        success:
          type: boolean
          description: "라인업 등록 성공 여부"
          example: true
        message:
          type: string
          description: "추가 메시지 (예: '라인업 제출이 완료되었습니다.')"
          example: "라인업 제출이 완료되었습니다."
      required:
        - success
      example:
        success: true
        message: "라인업 제출이 완료되었습니다."
    PatchLineupRequest:
      type: object
      properties:
        batters:
          type: array
          description: |
            타자만 교체할 경우 `batters`만 포함  
            투수만 교체할 경우 `pitcher`만 포함  
            둘 다 교체할 경우 두 필드를 모두 포함
          items:
            $ref: "#/components/schemas/LineupBatterUpdate"
        
        pitcher:
          $ref: "#/components/schemas/LineupPitcherUpdate"
      
      example:
        batters:
          - battingOrder: 5
            playerId: 999
            position: "2B"
        pitcher:
          playerId: 110

    LineupBatterUpdate:
      type: object
      properties:
        battingOrder:
          type: integer
          nullable: true
          description: |
            변경할 타순 (1~9).  
          example: 5
        playerId:
          type: integer
          description: "새로 교체될 선수 ID (또는 교체 대상)."
          example: 999
        position:
          type: string
          description: "포지션 (예: '2B', 'P', 'SS' 등)."
          example: "2B"
      required:
        - playerId
        - position
    
    LineupPitcherUpdate:
      type: object
      properties:
        playerId:
          type: integer
          description: "교체될 투수 선수 ID"
          example: 110
      required:
        - playerId
        
    PatchLineupResponse:
      type: object
      properties:
        success:
          type: boolean
          description: "라인업 수정 성공 여부"
          example: true
        message:
          type: string
          description: "추가 메시지 (예: '라인업 수정이 완료되었습니다.')"
          example: "라인업 수정이 완료되었습니다."
      required:
        - success
      example:
        success: true
        message: "라인업 수정이 완료되었습니다."
    
    CurrentBatterResponse:
      type: object
      properties:
        playerId:
          type: integer
          description: "선수 ID"
          example: 101
        playerName:
          type: string
          description: "선수 이름"
          example: "홍길동"
        position:
          type: string
          description: "포지션"
          example: "CF"
        battingOrder:
          type: integer
          description: "현재 타순 (1~9)"
          example: 3


    CurrentPitcherResponse:
      type: object
      properties:
        playerId:
          type: integer
          description: "선수 ID"
          example: 55
        playerName:
          type: string
          description: "선수 이름"
          example: "김철수"
        position:
          type: string
          description: "포지션"
          example: "P"

    SimpleScoreRequest:
      type: object
      properties:
        runs:
          type: integer
          example: 1
          description: "득점 수"
      required:
        - runs

    ScoreboardResponse:
      type: object
      properties:
        scoreboard:
          type: array
          description: "이닝별 전체 점수 목록"
          items:
            $ref: "#/components/schemas/InningHalfScore"
        teamSummary:
          type: object
          properties:
            home:
              $ref: "#/components/schemas/TeamSummary"
            away:
              $ref: "#/components/schemas/TeamSummary"
