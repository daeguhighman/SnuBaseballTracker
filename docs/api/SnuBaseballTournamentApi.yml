  /plays/{playId}/rollback:
    post:
      summary: "특정 타석으로 롤백"
      description: |
        특정 타석까지 되돌립니다.
        - 해당 타석 이후의 모든 타석과 주자 이벤트를 삭제
        - 대상 타석을 LIVE 상태로 되돌림
        - 타석 결과와 주자 이벤트를 초기화
        - 현재 타자/투수 정보를 롤백된 타석 기준으로 업데이트
      tags:
        - "plays"
      parameters:
        - name: playId
          in: path
          required: true
          schema:
            type: integer
          description: "롤백할 타석 ID"
          example: 501
      responses:
        "200":
          description: "롤백 성공"
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: "롤백 성공 여부"
                    example: true
                  message:
                    type: string
                    description: "롤백 결과 메시지"
                    example: "Play 501로 롤백되었습니다."
                  rollbackedPlaysCount:
                    type: integer
                    description: "삭제된 타석 수"
                    example: 3
                  currentPlay:
                    type: object
                    properties:
                      id:
                        type: integer
                        description: "현재 타석 ID"
                        example: 501
                      seq:
                        type: integer
                        description: "현재 타석 시퀀스"
                        example: 5
                      status:
                        type: string
                        enum: ["LIVE", "COMPLETE", "ABANDONED"]
                        description: "현재 타석 상태"
                        example: "LIVE"
                      batterGpId:
                        type: integer
                        description: "현재 타자 출전 정보 ID"
                        example: 101
                      pitcherGpId:
                        type: integer
                        description: "현재 투수 출전 정보 ID"
                        example: 110
                    required:
                      - id
                      - seq
                      - status
                      - batterGpId
                      - pitcherGpId
                required:
                  - success
                  - message
                  - rollbackedPlaysCount
                  - currentPlay
        "400":
          description: "잘못된 요청 (예: 존재하지 않는 타석)"
        "404":
          description: "타석을 찾을 수 없음"

