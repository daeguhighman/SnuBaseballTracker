            타순 (1~9)
          example: 1
        playerId:
          type: integer
          description: "선수 고유 ID"
          example: 101
        playerName:
          type: string
          description: "선수 이름"
          example: "윤동현"
        position:
          type: string
          description: "포지션 (CF, SS, C, 1B, 2B, 3B, LF, RF, DH, P 등)"
          example: "CF"
