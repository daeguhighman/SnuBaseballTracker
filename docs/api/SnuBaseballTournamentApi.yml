openapi: 3.0.0
info:
  version: '2.0.0'
  title: 'SnuBaseballTracker'
  description: 'SnuBaseballTracker API'
servers:
  - description: SwaggerHub API Auto Mocking
    url: https://virtserver.swaggerhub.com/YUNDONGHYUN/SnuBaseballTracker/2.0.0
tags: 
  - name: auth
  - name: profile
  - name: tournaments
  - name: teams
  - name: games
  - name: plays
  - name: admin
  
paths:
  /auth/email/request:
    post:
      summary: "이메일 인증번호 발송"
      description: |
        사용자 이메일(@snu.ac.kr)로 인증번호를 발송합니다.
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                  example: "junho@snu.ac.kr"
      responses:
        "200":
          description: "인증번호 발송 성공"
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Verification code sent to junho@snu.ac.kr."
        "400":
          description: "잘못된 이메일 형식 또는 도메인 아님"
        "429":
          description: "요청 횟수 초과"

  /auth/email/verify:
    post:
      summary: "이메일 인증번호 검증"
      description: "이메일과 인증번호를 검증하여 이메일 소유 여부를 확인합니다."
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, code]
              properties:
                email:
                  type: string
                  format: email
                  example: "junho@snu.ac.kr"
                code:
                  type: string
                  example: "847219"
      responses:
        "200":
          description: "인증 성공"
          content:
            application/json:
              schema:
                type: object
                properties:
                  verificationToken:
                    type: string
                    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJrZXJvcm8xOTY3MTk2N0BnbWFpbC5jb20iLCJpYXQiOjE3NTEwMDA4NzMsImV4cCI6MTc1MTAwMjY3MywiaXNzIjoiZGFlZ3VoaWdobWFuIn0.TkUlL704jrRcgNF2YMBdroJqIi_8flXon_1j2q3Ncb4"
        "400":
          description: "잘못된 코드 또는 만료됨"

  /auth/signup:
    post:
      summary: "회원가입 (비밀번호 설정)"
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, verificationToken]
              properties:
                email:
                  type: string
                  format: email
                  example: "junho@snu.ac.kr"
                password:
                  type: string
                  format: password
                  example: "mypassword123!"
                verificationToken:
                  type: string
                  example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJrZXJvcm8xOTY3MTk2N0BnbWFpbC5jb20iLCJpYXQiOjE3NTEwMDA4NzMsImV4cCI6MTc1MTAwMjY3MywiaXNzIjoiZGFlZ3VoaWdobWFuIn0.TkUlL704jrRcgNF2YMBdroJqIi_8flXon_1j2q3Ncb4"
      responses:
        "200":
          description: "회원가입 완료"
          headers:
            Set-Cookie:
              schema:
                type: string
                example: "refresh_token=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        "400":
          description: "이메일 인증이 안 되었거나 이미 가입됨"

  /auth/login:
    post:
      summary: "로그인"
      description: "이메일과 비밀번호로 로그인합니다."
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: "junho@snu.ac.kr"
                password:
                  type: string
                  format: password
                  example: "mypassword123!"
      responses:
        "200":
          description: "로그인 성공"
          headers:
            Set-Cookie:
              schema:
                type: string
                example: "refresh_token=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        "401":
          description: "이메일 또는 비밀번호가 잘못됨"

  /auth/refresh:
    post:
      parameters:
        - name: refresh_token
          in: cookie
          schema:
            type: string
            example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
      summary: "토큰 갱신"
      tags: [auth]
      responses:
        "200":
          description: "토큰 갱신 성공"
          headers:
            Set-Cookie:
              schema:
                type: string
                example: "refresh_token=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        "401":
          description: "리프레시 토큰이 만료되었거나 유효하지 않음"

  /auth/logout:
    post:
      summary: "로그아웃"
      tags: [auth]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: "로그아웃 성공"

  /auth/password/change:
    post:
      summary: "비밀번호 변경"
      tags: [auth]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword:
                  type: string
                  format: password
                  example: "oldpassword123!"
                newPassword:
                  type: string
                  format: password
      responses:
        "200":
          description: "비밀번호 변경 성공"
          headers:
            Set-Cookie:
              schema:
                type: string
                example: "refresh_token=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        "401":
          description: "비밀번호 변경 실패"

  /auth/password/request-reset:
    post:
      summary: "비밀번호 재설정 링크 요청"
      description: "사용자 이메일로 비밀번호 재설정 링크를 전송합니다."
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                  example: "user@example.com"
      responses:
        "200":
          description: "재설정 링크 전송 성공"
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "비밀번호 재설정 이메일이 전송되었습니다."

  /auth/password/reset:
    post:
      summary: "비밀번호 재설정"
      description: "이메일로 받은 링크에 포함된 토큰으로 비밀번호를 재설정합니다."
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, newPassword]
              properties:
                token:
                  type: string
                  description: "이메일로 받은 재설정 토큰"
                  example: "abc123def456..."
                newPassword:
                  type: string
                  minLength: 8
                  description: "새로운 비밀번호 (최소 8자)"
                  example: "newPassword123"
      responses:
        "200":
          description: "비밀번호 재설정 성공"
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "비밀번호가 성공적으로 재설정되었습니다."
        "400":
          description: "토큰이 만료되었거나 유효하지 않음"
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "유효하지 않은 재설정 토큰입니다."
                  errorCode:
                    type: string
                    example: "INVALID_RESET_TOKEN"


  /tournaments:
    get:
      summary: "전체 대회목록 조회"
      description: |
        모든 토너먼트 목록을 조회합니다. 연도 내림차순, 생성일 내림차순으로 정렬됩니다.
      tags: [tournaments]
      responses:
        "200":
          description: "전체 대회목록 조회 성공"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TournamentListResponse"
        "500":
          description: "서버 내부 오류"

  /tournaments/{tournamentId}/teams/grouped:
    get:
      summary: "토너먼트별 조의 팀 목록을 조별로 그룹화하고 순위별로 정렬해서 조회"
      tags: [tournaments]
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
          description: "토너먼트 ID"
          example: 1
      responses:
        "200":
          description: "토너먼트별 조별로 그룹화된 팀 목록 반환 (각 조 내부는 순위 순 정렬)"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupedTeamResponse"
        "404":
          description: "해당 토너먼트가 존재하지 않는 경우"

  /tournaments/{tournamentId}/teams/{teamTournamentId}/players:
    get:
      summary: "토너먼트별 팀 선수 목록 조회"
      description: |
        토너먼트 ID와 팀-토너먼트 ID를 경로로 받아 해당 팀에 소속된 선수들을 리스트업합니다.
        선수의 ID는 playerTournamentId를 사용합니다.
      tags: [tournaments]
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
          description: "토너먼트 ID"
          example: 1
        - name: teamTournamentId
          in: path
          required: true
          schema:
            type: integer
          description: "팀-토너먼트 ID"
          example: 1
      responses:
        "200":
          description: "성공적으로 선수 목록을 가져옴"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerListResponse"
        "404":
          description: "해당 토너먼트 또는 팀이 존재하지 않는 경우"

  /tournaments/{tournamentId}/records/batters:
    get:
      summary: "토너먼트별 타자 기록 조회"
      description: |
        특정 토너먼트의 타자 기록을 반환합니다. 안타 수가 1이상인 선수들을 안타 수를 기준으로 내림차순 정렬합니다.
      tags: [tournaments]
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
          description: "토너먼트 ID"
          example: 1
      responses:
        "200":
          description: "성공적으로 타자 기록을 가져옴"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatterRecordsResponse"
        "404":
          description: "해당 토너먼트가 존재하지 않는 경우"
        "500":
          description: "서버 내부 오류"

  /tournaments/{tournamentId}/records/pitchers:
    get:
      summary: "토너먼트별 투수 기록 조회"
      description: |
        특정 토너먼트의 투수 기록을 반환합니다. 탈삼진 수를 기준으로 상위 20명을 내림차순 정렬합니다.
      tags: [tournaments]
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
          description: "토너먼트 ID"
          example: 1
      responses:
        "200":
          description: "성공적으로 투수 기록을 가져옴"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PitcherRecordsResponse"
        "404":
          description: "해당 토너먼트가 존재하지 않는 경우"
        "500":
          description: "서버 내부 오류"

  /games:
    get:
      summary: "날짜 범위에 따른 경기 일정 조회"
      tags: [games]
      parameters: 
        - name: from
          in: query
          required: true
          schema:
            type: string
            format: date
          description: "조회 시작 날짜 (YYYY-MM-DD 형태)"
          example: "2025-04-23"
        - name: to
          in: query
          required: true
          schema:
            type: string
            format: date
          description: "조회 종료 날짜 (YYYY-MM-DD 형태)"
          example: "2025-04-25"
      responses:
        "200":
          description: "날짜 범위 내 경기 일정 정보"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GamesByDatesResponse"
        "400":
          description: "잘못된 파라미터 형식"
        "404":
          description: "해당 날짜 범위의 경기가 존재하지 않음"

  # /games/bracket-schedule:
  #   get:
  #     summary: "토너먼트 브라켓 일정 조회"
  #     tags: [games]
  #     responses:
  #       "200":
  #         description: "토너먼트 브라켓 일정 조회 성공"
  #         content:
  #           application/json:
  #             schema:
  #               $ref: "#/components/schemas/TournamentScheduleResponse"

  /games/{gameId}/teams/{teamTournamentId}/players:
    get:
      summary: "특정 경기의 선수 목록 조회"
      description: |
        특정 경기의 선수 목록을 조회합니다.
        선수의 ID는 playerTournamentId를 사용합니다.
      tags: [games]
      parameters:
        - name: gameId
          in: path
          required: true
          schema:
            type: integer
          description: "경기 ID"
          example: 1001
        - name: teamTournamentId
          in: path
          required: true
          schema:
            type: integer
          description: "팀-토너먼트 ID"
          example: 1
      responses:
        "200":
          description: "성공적으로 선수 목록을 가져옴"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerListResponse"

  /games/{gameId}/teams/{teamTournamentId}/players-with-in-lineup:
    get:
      summary: "특정 경기의 선수 목록 조회 for 교체명단 등록"
      description: |
        라인업 등록여부를 inLineup 필드에 표시합니다.
        선수의 ID는 playerTournamentId를 사용합니다.
      tags: [games]
      parameters:
        - name: gameId
          in: path
          required: true
          schema:
            type: integer
          description: "경기 ID"
          example: 1001
        - name: teamTournamentId
          in: path
          required: true
          schema:
            type: integer
          description: "팀-토너먼트 ID"
          example: 1
      responses:
        "200":
          description: "성공적으로 선수 목록을 가져옴"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerListWithInLineupResponse"

  /games/{gameId}/teams/{teamTournamentId}/substitution:
    post:
      summary: "특정 경기의 교체 명단 제출"
      tags: [games]
      parameters:
        - name: gameId
          in: path
          required: true
          schema:
            type: integer
          description: "경기 ID"
          example: 1001
        - name: teamTournamentId
          in: path
          required: true
          schema:
            type: integer
          description: "팀-토너먼트 ID"
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitSubstitutionRequest"
      responses:
        "200":
          description: "교체 명단 제출 성공"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmitSubstitutionResponse"
        "400":
          description: "잘못된 요청 (예: 이미 제출된 라인업, 중복된 선수, 인원이 부족 등)"
        "404":
          description: "해당 경기 또는 팀을 찾을 수 없음"

  /games/{gameId}/teams/{teamTournamentId}/substitutable-batters:
    get:
      summary: "교체 가능한 타자 목록 조회"
      description: |
        교체 가능한 타자 목록을 조회합니다.
        선수의 ID는 playerTournamentId를 사용합니다.
      tags: [games]
      parameters:
        - name: gameId
          in: path
          required: true
          schema:
            type: integer
          description: "경기 ID"
          example: 1001
        - name: teamTournamentId
          in: path
          required: true
          schema:
            type: integer
          description: "팀-토너먼트 ID"
          example: 1
      responses:
        "200":
          description: "교체 가능한 타자 목록 조회 성공"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerListWithSubstitutionFlag"

  /games/{gameId}/teams/{teamTournamentId}/substitutable-pitchers:
    get:
      summary: "교체 가능한 투수 목록 조회"
      description: |
        교체 가능한 투수 목록을 조회합니다.
        선수의 ID는 playerTournamentId를 사용합니다.
      tags: [games]
      parameters:
        - name: gameId
          in: path
          required: true
          schema:
            type: integer
          description: "경기 ID"
          example: 1001
        - name: teamTournamentId
          in: path
          required: true
          schema:
            type: integer
          description: "팀-토너먼트 ID"
          example: 1
      responses:
        "200":
          description: "교체 가능한 투수 목록 조회 성공"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerListWithSubstitutableResponse"

  /games/{gameId}/teams/{teamTournamentId}/lineup:
    get:
      summary: "특정 경기의 라인업 조회"
      description: |
        특정 경기의 라인업을 조회합니다.
        선수의 ID는 playerTournamentId를 사용합니다.
      tags: [games]
      parameters:
        - name: gameId
          in: path
          required: true
          schema:
            type: integer
          description: "경기 ID"
          example: 1001
        - name: teamTournamentId
          in: path
          required: true
          schema:
            type: integer
          description: "팀-토너먼트 ID"
          example: 1
      responses:
        "200":
          description: "특정 경기의 라인업 조회 성공"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LineupResponse"
        "404":
          description: "해당 경기 또는 팀을 찾을 수 없음"
          
    post:
      summary: "특정 경기의 라인업 제출"
      description: |
        특정 경기의 라인업을 제출합니다.
        선수의 ID는 playerTournamentId를 사용합니다.
      tags: [games]
      parameters:
        - name: gameId
          in: path
          required: true
          schema:
            type: integer
          description: "경기 ID"
          example: 1001
        - name: teamTournamentId
          in: path
          required: true
          schema:
            type: integer
          description: "팀-토너먼트 ID"
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitLineupRequest"
      responses:
        "201":
          description: "라인업 제출 성공"
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "라인업이 성공적으로 제출되었습니다."
        "400":
          description: "잘못된 라인업 데이터"
        "404":
          description: "해당 경기 또는 팀을 찾을 수 없음"
          
    patch:
      summary: "특정 경기 라인업 부분 수정"
      description: |
        특정 경기의 라인업을 수정합니다.
        선수의 ID는 playerTournamentId를 사용합니다.
        라인업 수정 후 해당 게임의 최신 umpire snapshot을 함께 반환합니다.
      tags: [games]
      parameters:
        - name: gameId
          in: path
          required: true
          schema:
            type: integer
          description: "경기 ID"
          example: 1001
        - name: teamTournamentId
          in: path
          required: true
          schema:
            type: integer
          description: "팀-토너먼트 ID"
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitLineupRequest"
      responses:
        "200":
          description: "라인업 수정 성공"
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "라인업이 업데이트되었습니다."
                  snapshot:
                    $ref: "#/components/schemas/PlaySnapshotResponse"
                    description: "라인업 수정 후의 최신 umpire snapshot"
        "400":
          description: "잘못된 라인업 데이터"
        "404":
          description: "해당 경기 또는 팀을 찾을 수 없음"

  /games/{gameId}/start:
    post:
      summary: "게임 시작"
      description: |
        게임을 시작하고 초기 상태를 설정합니다.
        - 게임 상태를 IN_PROGRESS로 변경
        - GameStat 생성 및 초기화 (점수 0, 1회초, 원정팀 1번타자 vs 홈팀 선발투수)
        - 양 팀의 라인업이 모두 제출되어 있어야 함
      tags: [games]
      parameters:
        - name: gameId
          in: path
          required: true
          schema:
            type: integer
          description: "게임 ID"
          example: 1001
      responses:
        "200":
          description: "게임 시작 성공"
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: "게임 시작 성공 여부"
                    example: true
                  message:
                    type: string
                    description: "게임 시작 메시지"
                    example: "게임이 시작되었습니다."
                  snapshot:
                    $ref: "#/components/schemas/PlaySnapshotResponse"
                required:
                  - success
                  - message
                  - snapshot
        "400":
          description: |
            잘못된 요청
            - 이미 시작된 게임
            - 라인업이 제출되지 않은 경우
            - 필수 선수(투수, 타자)가 없는 경우
        "404":
          description: "게임을 찾을 수 없음"

  /games/{gameId}/result:
    get:
      summary: "게임 결과 조회"
      description: |
        특정 게임의 상세 결과를 조회합니다.
        - 이닝별 점수
        - 팀 요약 정보
        - 타자/투수 기록
      tags: [games]
      parameters:
        - name: gameId
          in: path
          required: true
          schema:
            type: integer
          description: "경기 ID"
          example: 101
      responses:
        "200":
          description: "게임 결과 조회 성공"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameResultsResponse"
        "404":
          description: "경기를 찾을 수 없음"
        "500":
          description: "서버 내부 오류"
          
    post:
      summary: "경기 종료 및 결과 확정"
      description: |
        경기를 종료하고 결과를 확정합니다.
        - 게임 상태를 EDITING으로 변경
        - 이닝 점수 기록
        - 게임 상태를 FINALIZED로 변경
        - 팀/선수 통계 업데이트
      tags: [games]
      security:
        - BearerAuth: []
      parameters:
        - name: gameId
          in: path
          required: true
          schema:
            type: integer
          description: "경기 ID"
          example: 101
      responses:
        "200":
          description: "경기 종료 및 결과 확정 성공"
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "게임이 성공적으로 종료되었습니다."
        "400":
          description: "이미 종료된 경기, 또는 정합성 오류"
        "401":
          description: "인증되지 않은 요청"
        "404":
          description: "경기를 찾을 수 없음"



