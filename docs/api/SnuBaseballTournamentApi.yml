      description: |
        특정 타석에 주자 이동 이벤트를 추가합니다.
        - 주자의 진루, 도루, 실책 등 다양한 이벤트 기록
        - 여러 주자 이벤트를 한 번에 추가 가능
      tags:
        - "plays"
      parameters:
        - name: playId
          in: path
