        $ref: "#/components/schemas/TeamList"
      example:
        A:
          - id: 1
            name: "관악사"
            games: 4
            wins: 4
            draws: 0
            losses: 0
            rank: 1
          - id: 2
            name: "포톤스"
            games: 4
            wins: 3
            draws: 0
            losses: 1
            rank: 2
        B:
          - id: 3
            name: "아갉쥐"
            games: 4
            wins: 2
            draws: 0
            losses: 2
            rank: 1
    
    TeamList:
      type: array
