                  type: string
                  description: "팀 이름"
                  example: "홈팀"
              required:
                - id
                - name
            scoreboard:
              type: object
              description: "스코어보드 정보"
              properties:
                innings:
                  type: array
                  description: "이닝별 점수 목록"
                  example:
                    - inning: 1
                      away: 2
                      home: 1
